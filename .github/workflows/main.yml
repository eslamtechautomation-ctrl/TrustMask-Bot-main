name: Secure Podcast Automator

on:
  schedule:
    # سيقوم بالنشر كل ساعتين بالظبط (12 حلقة في اليوم)
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser groq edge-tts   
          
      - name: Install Dependencies
        run: pip install groq edge-tts selenium webdriver-manager

      - name: Run Mystery Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SPOTIFY_EMAIL: ${{ secrets.SPOTIFY_EMAIL }}
          SPOTIFY_PASSWORD: ${{ secrets.SPOTIFY_PASSWORD }}
        run: python main.py

      - name: Delete Old Episodes
        uses: dev-drprasad/delete-older-releases@v0.2.1
        with:
          keep_latest: 100 # الاحتفاظ بآخر 3 فقط لضمان المساحة
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and Push RSS Update
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # إضافة --force أو تغيير بسيط لضمان وجود اختلاف
          git add podcast.xml
          # إضافة تاريخ التشغيل لرسالة الـ Commit يضمن أنها لن تكون مكررة أبداً
          git commit -m "Update RSS Feed: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]" || echo "No changes"
          git push origin main --force
          
      - name: Save Episode to Releases
        uses: softprops/action-gh-release@v1
        with:
          files: episode.mp3
          tag_name: "v${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and Push RSS Update
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # إضافة --force أو تغيير بسيط لضمان وجود اختلاف
          git add podcast.xml
          # إضافة تاريخ التشغيل لرسالة الـ Commit يضمن أنها لن تكون مكررة أبداً
          git commit -m "Update RSS Feed: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]" || echo "No changes"
          git push origin main --force
          
